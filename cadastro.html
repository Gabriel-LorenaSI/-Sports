<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/index.css" />
    <link rel="stylesheet" href="./css/cadastro.css" />
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon" />
    <title>Cadastro | +Sports</title>
  </head>
  <body>
    <header class="headerLogin">
      <nav class="nav-full-bleed">
        <a href="index.html"><img src="img/logo.png" alt="" class="nav-logo" /></a>
        <div class="menu-hamburger" id="btnMenu">☰</div>
        <div class="nav-links-wrapper grid-layout text-button-2" id="menuLateral">
          <div class="btn-fechar" id="btnFechar">✖</div>
          <a href="index.html">Home</a>
          <a href="#">Eventos</a>
          <a href="#">Peladas</a>
          <a href="login.html">Login</a>
        </div>

        <div class="trilho" id="tema-toggle">
          <span class="icone-sol">☀</span>
          <span class="icone-lua">◐</span>
          <div class="indicador"></div>
        </div>

        <input
          type="text"
          placeholder="Pesquisar"
          class="nav-search text-label"
        />
      </nav>
    </header>
    <section class="cadastroPrincipal">
      <div class="camposDeCadastro">
        <h3 class="text-h3">Cadastro</h3>

        <label for="nome">
          <h4>Nome Completo</h4>
          <input
            class="fontPlaceholder"
            type="text"
            id="nome"
            placeholder="Seu nome completo"
            oninput="aplicarMascara(this, 'nome')"
            onblur="validarNome(this)"
            required
          />
          <span class="msg-erro">Digite um nome válido</span>
        </label>

        <label for="cpf">
          <h4>CPF</h4>
          <input
            class="fontPlaceholder"
            type="text"
            id="cpf"
            placeholder="000.000.000-00"
            oninput="aplicarMascara(this, 'cpf')"
            onblur="validarCPF(this)"
            required
          />
          <span class="msg-erro">Digite um CPF válido</span>
        </label>

        <label for="emaile">
          <h4>E-mail</h4>
          <input
            class="fontPlaceholder"
            type="email"
            id="emaile"
            placeholder="seu@email.com"
            onblur="validarEmail(this)"
            required
          />
          <span class="msg-erro">Digite um e-mail válido</span>
        </label>

        <label for="dob">
          <h4>Data de nascimento</h4>
          <input
            class="fontPlaceholder"
            type="text"
            id="dob"
            placeholder="dd/mm/aaaa"
            oninput="aplicarMascara(this, 'data')"
            required
          />
        </label>

        <label for="senhaInput">
          <h4>Senha</h4>
          <input
            class="fontPlaceholder"
            type="password"
            id="senhaInput"
            placeholder="Senha forte"
            onblur="validarSenha(this)"
            required
          />
          <span class="msg-erro" id="erroSenha">
            A senha deve ter no mínimo: 8 caracteres, 1 maiúscula, 1 minúscula, 1 número e 1 símbolo
          </span>
        </label>

        <label for="2pw">
          <h4>Confirmar Senha</h4>
          <input
            class="fontPlaceholder"
            type="password"
            id="2pw"
            placeholder="Repita a senha"
            onblur="validarConfirmarSenha(this)"
            required
          />
          <span class="msg-erro">As senhas não coincidem</span>
        </label>

        <a href="login.html" class="buttonCadastro text-button-2">Cadastrar</a>

        <p class="politica text-label">
          Ao entrar, você está aceitando a nossa
          <a href=""> Política de Privacidade</a> e
          <a href="#">Termos de Uso</a>
        </p>
        <p class="logarConta text-label">
          Já tem conta? <a href="login.html">Entrar com sua conta +Sports</a>
        </p>
      </div>

      <div class="imgCadastro">
        <img src="img/imgCadastro.png" alt="imagemTelaDeLogin" />
      </div>
    </section>

    <script src="./js/cadastro.js"></script>
    <script src="./js/tema.js"></script>
  </body>
</html>
